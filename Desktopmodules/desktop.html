<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' data:;
                   script-src 'self' 'unsafe-inline';
                   style-src 'self' 'unsafe-inline' https:;
                   img-src * data: file: blob:;
                   media-src * data: file:;
                   font-src *;
                   connect-src * ws: wss:;">
    <title>VCPdesktop</title>
    <!-- 导入主题CSS，获得壁纸和主题变色能力 -->
    <link rel="stylesheet" href="../styles/themes.css">
    <link rel="stylesheet" href="desktop.css">
    <!-- 渲染依赖 -->
    <script src="../vendor/marked.min.js"></script>
    <script src="../vendor/highlight.min.js"></script>
    <script src="../vendor/anime.min.js"></script>
    <script src="../vendor/three.min.js"></script>
    <script src="../vendor/morphdom.min.js"></script>
</head>
<body>
    <!-- 沉浸式标题栏 -->
    <div id="desktop-title-bar">
        <div class="desktop-title-bar-drag-region"></div>
        <div class="desktop-title-bar-controls">
            <span class="desktop-title-text">VCPdesktop</span>
            <div class="desktop-title-buttons">
                <!-- 侧栏开关按钮 -->
                <button id="desktop-btn-sidebar" class="desktop-title-btn" title="收藏夹侧栏">
                    <svg viewBox="0 0 10 10">
                        <rect x="0" y="1" width="4" height="8" rx="0.5"></rect>
                        <rect x="5.5" y="1" width="4.5" height="3" rx="0.5"></rect>
                        <rect x="5.5" y="5.5" width="4.5" height="3.5" rx="0.5"></rect>
                    </svg>
                </button>
                <button id="desktop-btn-minimize" class="desktop-title-btn" title="最小化">
                    <svg viewBox="0 0 10 10"><rect x="0" y="4" width="10" height="1.2"></rect></svg>
                </button>
                <button id="desktop-btn-maximize" class="desktop-title-btn" title="最大化">
                    <svg viewBox="0 0 10 10"><path d="M0,0v10h10V0H0z M9,9H1V1h8V9z"></path></svg>
                </button>
                <button id="desktop-btn-close" class="desktop-title-btn desktop-title-btn-close" title="关闭">
                    <svg viewBox="0 0 10 10"><polygon points="10,1.01 8.99,0 5,3.99 1.01,0 0,1.01 3.99,5 0,8.99 1.01,10 5,6.01 8.99,10 10,8.99 6.01,5"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 挂件画布区域 -->
    <div id="desktop-canvas">
        <!-- 挂件容器和桌面图标将动态插入这里 -->
    </div>

    <!-- 底部 Dock 栏 -->
    <div id="desktop-dock">
        <div id="desktop-dock-items">
            <!-- Dock 图标将动态插入这里 -->
        </div>
        <div class="desktop-dock-divider"></div>
        <button id="desktop-dock-more-btn" class="desktop-dock-btn" title="全部应用" style="display:none;">⋯</button>
        <button id="desktop-dock-scan-btn" class="desktop-dock-btn" title="导入桌面快捷方式">📥</button>
    </div>

    <!-- 应用抽屉 -->
    <div id="desktop-dock-drawer">
        <div id="desktop-dock-drawer-panel">
            <div class="desktop-dock-drawer-header">
                <span class="desktop-dock-drawer-title">📦 全部应用</span>
                <button id="desktop-dock-drawer-close" class="desktop-dock-drawer-close-btn" title="关闭">✕</button>
            </div>
            <div id="desktop-dock-drawer-list">
                <div class="desktop-dock-drawer-empty">暂无应用</div>
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div id="desktop-context-menu" class="desktop-context-menu">
        <button class="desktop-context-menu-item" data-action="favorite">⭐ 收藏</button>
        <button class="desktop-context-menu-item" data-action="refresh" style="display:none;">🔄 刷新</button>
        <div class="desktop-context-menu-divider"></div>
        <button class="desktop-context-menu-item" data-action="bring-front">⬆ 置顶</button>
        <button class="desktop-context-menu-item" data-action="send-back">⬇ 置底</button>
        <div class="desktop-context-menu-divider"></div>
        <button class="desktop-context-menu-item desktop-context-menu-item-danger" data-action="close">✕ 关闭</button>
    </div>

    <!-- 收藏模态窗 -->
    <div id="desktop-save-modal" class="desktop-modal-overlay">
        <div class="desktop-modal">
            <div class="desktop-modal-title">收藏挂件</div>
            <p class="desktop-modal-desc">为这个挂件取一个名字，它将被保存到收藏夹中。</p>
            <input type="text" class="desktop-modal-input" placeholder="输入收藏名称..." maxlength="64" />
            <div class="desktop-modal-buttons">
                <button class="desktop-modal-cancel">取消</button>
                <button class="desktop-modal-confirm">确认收藏</button>
            </div>
        </div>
    </div>

    <!-- 收藏侧栏（分页） -->
    <div id="desktop-sidebar" class="desktop-sidebar">
        <div class="desktop-sidebar-header">
            <span class="desktop-sidebar-title">📦 面板</span>
            <button class="desktop-sidebar-close" title="关闭侧栏">✕</button>
        </div>
        <!-- 分页标签 -->
        <div class="desktop-sidebar-tabs">
            <button class="desktop-sidebar-tab active" data-tab="widgets">🧩 挂件</button>
            <button class="desktop-sidebar-tab" data-tab="favorites">⭐ 收藏</button>
            <button class="desktop-sidebar-tab" data-tab="presets">📐 预设</button>
        </div>
        <!-- 挂件页 -->
        <div id="desktop-sidebar-page-widgets" class="desktop-sidebar-page active">
            <div class="desktop-sidebar-section-title">官方挂件</div>
            <div id="desktop-sidebar-builtin-list" class="desktop-sidebar-list"></div>
        </div>
        <!-- 收藏页 -->
        <div id="desktop-sidebar-page-favorites" class="desktop-sidebar-page">
            <div id="desktop-sidebar-list" class="desktop-sidebar-list">
                <div class="desktop-sidebar-empty">暂无收藏</div>
            </div>
        </div>
        <!-- 预设页 -->
        <div id="desktop-sidebar-page-presets" class="desktop-sidebar-page">
            <div class="desktop-sidebar-preset-actions">
                <button id="desktop-sidebar-save-preset" class="desktop-sidebar-preset-btn">💾 保存当前布局</button>
            </div>
            <div id="desktop-sidebar-preset-list" class="desktop-sidebar-list">
                <div class="desktop-sidebar-empty">暂无布局预设</div>
            </div>
        </div>
    </div>

    <!-- 状态指示器 -->
    <div id="desktop-status-indicator" class="desktop-status hidden">
        <span class="desktop-status-dot"></span>
        <span class="desktop-status-text">等待连接...</span>
    </div>

    <!-- ============================================================
         模块化脚本加载（严格按依赖顺序）
         ============================================================ -->
    <!-- 1. 核心层：状态 & 常量（无依赖） -->
    <script src="core/state.js"></script>
    <!-- 2. 核心层：主题同步 -->
    <script src="core/theme.js"></script>
    <!-- 3. 核心层：状态指示器（依赖 state） -->
    <script src="core/statusIndicator.js"></script>
    <!-- 4. 核心层：Z-Index 管理（依赖 state） -->
    <script src="core/zIndexManager.js"></script>
    <!-- 5. 核心层：拖拽系统（依赖 CONSTANTS, zIndex） -->
    <script src="core/dragSystem.js"></script>
    <!-- 6. 核心层：挂件管理（依赖 state, CONSTANTS, domRefs, drag, zIndex） -->
    <script src="core/widgetManager.js"></script>
    <!-- 7. UI层：右键菜单（依赖 state, widget, zIndex） -->
    <script src="ui/contextMenu.js"></script>
    <!-- 8. UI层：收藏模态窗（依赖 state） -->
    <script src="ui/saveModal.js"></script>
    <!-- 9. UI层：侧栏（依赖 state, domRefs） -->
    <script src="ui/sidebar.js"></script>
    <!-- 9.5. UI层：Dock 栏（依赖 state, domRefs, CONSTANTS） -->
    <script src="ui/dock.js"></script>
    <!-- 9.6. UI层：图标选择器（依赖 state） -->
    <script src="ui/iconPicker.js"></script>
    <!-- 10. 收藏层：缩略图捕获 -->
    <script src="favorites/thumbnail.js"></script>
    <!-- 11. 收藏层：收藏管理器（依赖 state, status, widget, sidebar, thumbnail） -->
    <script src="favorites/favoritesManager.js"></script>
    <!-- 12. API层：vcpAPI 代理 -->
    <script src="api/vcpProxy.js"></script>
    <!-- 13. API层：IPC 桥接（依赖 state, status, widget） -->
    <script src="api/ipcBridge.js"></script>
    <!-- 14. 内置挂件：天气 -->
    <script src="builtinWidgets/weatherWidget.js"></script>
    <!-- 15. 内置挂件：音乐播放条 -->
    <script src="builtinWidgets/musicWidget.js"></script>
    <!-- 16. 内置挂件：新闻热点 -->
    <script src="builtinWidgets/newsWidget.js"></script>
    <!-- 17. 调试工具 -->
    <script src="debug/debugTools.js"></script>
    <!-- 18. 主入口：初始化编排 -->
    <script src="desktop.js"></script>
</body>
</html>
